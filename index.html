# Smart--Chat--AI-
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Chat AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;color:#e8e8f8;font-family:sans-serif;display:flex;flex-direction:column;height:100vh}
#hd{background:#10101a;border-bottom:1px solid #222;padding:12px 16px;display:flex;align-items:center;gap:10px}
#ic{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#00e5a0);display:flex;align-items:center;justify-content:center;font-size:20px}
#nm{font-weight:700;font-size:16px}
#sb{font-size:11px;color:#00e5a0}
#fd{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.r{display:flex;align-items:flex-end;gap:8px}
.r.u{justify-content:flex-end}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ba{background:linear-gradient(135deg,#6c63ff,#00e5a0)}
.ua{background:#222}
.b{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.b.bot{background:#161622;border:1px solid #222;border-radius:16px 16px 16px 4px;color:#d8d8f0}
.b.usr{background:linear-gradient(135deg,#6c63ff,#8b83ff);border-radius:16px 16px 4px 16px;color:#fff}
.tp{display:flex;gap:4px;padding:12px 16px;background:#161622;border:1px solid #222;border-radius:16px 16px 16px 4px}
.td{width:7px;height:7px;border-radius:50%;background:#6c63ff}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#bt{background:#10101a;border-top:1px solid #222;padding:10px 12px}
#ir{display:flex;gap:8px;align-items:flex-end;background:#161622;border:1px solid #222;border-radius:24px;padding:6px 8px 6px 14px}
#tx{flex:1;background:transparent;border:none;outline:none;color:#e0e0f8;font-size:14px;resize:none;font-family:sans-serif;line-height:1.5;padding-top:4px}
#tx::placeholder{color:#444}
#sb2{width:36px;height:36px;border-radius:50%;background:#1e1e2e;border:none;cursor:pointer;font-size:16px;flex-shrink:0;transition:.2s}
#sb2.on{background:linear-gradient(135deg,#6c63ff,#8b83ff)}
#ht{text-align:center;font-size:11px;color:#222;margin-top:5px}
</style>
</head>
<body>
<div id="hd">
  <div id="ic">🤖</div>
  <div>
    <div id="nm">Smart Chat AI</div>
    <div id="sb">✨ Made By Radwan-Islam-Alif</div>
  </div>
</div>
<div id="fd">
  <div class="r">
    <div class="av ba">🤖</div>
    <div class="b bot">আসসালামুয়ালাইকুম! 👋 আমি Smart Chat AI।

💬 যেকোনো প্রশ্ন করো
🎤 ভয়েস মেসেজ দাও

শুরু করো!</div>
  </div>
</div>
<div id="bt">
  <div id="ir">
    <button id="mc" onclick="voice()" style="width:34px;height:34px;border-radius:50%;border:1px solid #222;background:#1e1e2e;cursor:pointer;font-size:16px;flex-shrink:0">🎤</button>
    <textarea id="tx" placeholder="প্রশ্ন লিখুন..." rows="1" oninput="upd()" onkeydown="kd(event)"></textarea>
    <button id="sb2" onclick="send()">➤</button>
  </div>
  <div id="ht">Enter = পাঠাও</div>
</div>
<script>
const K="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";
const U="https://api.groq.com/openai/v1/chat/completions";
const S="তুমি একজন বুদ্ধিমান AI সহকারী। সব প্রশ্নের সঠিক উত্তর দাও। বাংলায় প্রশ্ন হলে বাংলায় উত্তর দাও।";
let H=[],rec=false,ro=null;
const fd=document.getElementById("fd");
const tx=document.getElementById("tx");
const sb=document.getElementById("sb2");

function add(r,t){
  const row=document.createElement("div");row.className="r"+(r==="u"?" u":"");
  if(r!=="u"){const a=document.createElement("div");a.className="av ba";a.textContent="🤖";row.appendChild(a);}
  const b=document.createElement("div");b.className="b "+(r==="u"?"usr":"bot");b.textContent=t;
  row.appendChild(b);
  if(r==="u"){const a=document.createElement("div");a.className="av ua";a.textContent="👤";row.appendChild(a);}
  fd.appendChild(row);fd.scrollTop=fd.scrollHeight;
}

function showT(){
  const row=document.createElement("div");row.className="r";row.id="tr";
  const a=document.createElement("div");a.className="av ba";a.textContent="🤖";
  const t=document.createElement("div");t.className="tp";
  [0,1,2].forEach(i=>{const d=document.createElement("div");d.className="td";d.style.animation=`b 1s ${i*.15}s infinite`;t.appendChild(d);});
  row.appendChild(a);row.appendChild(t);fd.appendChild(row);fd.scrollTop=fd.scrollHeight;
}
function hideT(){const e=document.getElementById("tr");if(e)e.remove();}

async function send(){
  const t=tx.value.trim();if(!t)return;
  add("u",t);H.push({role:"user",content:t});
  tx.value="";upd();showT();sb.disabled=true;
  try{
    const r=await fetch(U,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+K},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"system",content:S},...H],max_tokens:1024})
    });
    const d=await r.json();
    const rep=d?.choices?.[0]?.message?.content||"উত্তর পাওয়া যায়নি।";
    hideT();add("b",rep);H.push({role:"assistant",content:rep});
  }catch(e){hideT();add("b","❌ সমস্যা হয়েছে: "+e.message);}
  finally{sb.disabled=false;}
}

function upd(){
  tx.style.height="auto";tx.style.height=Math.min(tx.scrollHeight,100)+"px";
  sb.className=tx.value.trim()?"on":"";
}
function kd(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}

function voice(){
  if(rec){ro?.stop();rec=false;document.getElementById("mc").style.borderColor="#222";return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Chrome ব্যবহার করুন");return;}
  const r=new SR();r.lang="bn-BD";r.interimResults=true;
  r.onresult=e=>{tx.value=Array.from(e.results).map(x=>x[0].transcript).join("");upd();};
  r.onend=()=>{rec=false;document.getElementById("mc").style.borderColor="#222";};
  ro=r;r.start();rec=true;document.getElementById("mc").style.borderColor="#ef4444";
}
</script>
</body>
</html>
